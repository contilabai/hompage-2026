  <defs>
    <linearGradient id="ms-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8edf5"/>
      <stop offset="100%" stop-color="#d0d8e8"/>
    </linearGradient>
    <linearGradient id="ms-chassis" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e3d52"/>
      <stop offset="40%" stop-color="#1f2e42"/>
      <stop offset="100%" stop-color="#121e32"/>
    </linearGradient>
    <linearGradient id="ms-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3e5472"/>
      <stop offset="100%" stop-color="#2e3d52"/>
    </linearGradient>
    <linearGradient id="ms-right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#121e32"/>
      <stop offset="100%" stop-color="#0c1428"/>
    </linearGradient>
    <linearGradient id="ms-amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="ms-bay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#151f32"/>
      <stop offset="100%" stop-color="#0c1526"/>
    </linearGradient>
    <linearGradient id="ms-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1a2a"/>
      <stop offset="100%" stop-color="#090f1e"/>
    </linearGradient>
    <linearGradient id="ms-screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#041018"/>
      <stop offset="100%" stop-color="#000a14"/>
    </linearGradient>
    <filter id="ms-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="4" dy="14" result="blur"/>
      <feFlood flood-color="#000" flood-opacity="0.4"/>
      <feComposite in2="blur"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ms-glow-green">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ms-glow-amber">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

