<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 480">
  <defs>
    <linearGradient id="ls-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8edf5"/>
      <stop offset="100%" stop-color="#d0d8e8"/>
    </linearGradient>
    <linearGradient id="ls-chassis" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c3a52"/>
      <stop offset="40%" stop-color="#1e2b40"/>
      <stop offset="100%" stop-color="#111b2e"/>
    </linearGradient>
    <linearGradient id="ls-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d5170"/>
      <stop offset="100%" stop-color="#2c3a52"/>
    </linearGradient>
    <linearGradient id="ls-right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111b2e"/>
      <stop offset="100%" stop-color="#0a1220"/>
    </linearGradient>
    <linearGradient id="ls-amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="ls-bay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141e30"/>
      <stop offset="100%" stop-color="#0b1422"/>
    </linearGradient>
    <linearGradient id="ls-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1928"/>
      <stop offset="100%" stop-color="#080f1c"/>
    </linearGradient>
    <linearGradient id="ls-screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#041018"/>
      <stop offset="100%" stop-color="#000a14"/>
    </linearGradient>
    <filter id="ls-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="4" dy="14" result="blur"/>
      <feFlood flood-color="#000" flood-opacity="0.4"/>
      <feComposite in2="blur"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ls-glow-green">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ls-glow-amber">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

